  <!-- Vertical separator -->
  <line x1="36" y1="10" x2="36" y2="50" stroke="#d4971a" stroke-width="0.5" opacity="0.4"/>

  <!-- TURBO text -->
  <text x="44" y="28"
    font-family="'Playfair Display', Georgia, serif"
    font-size="18"
    font-weight="700"
    letter-spacing="3"
    fill="url(#goldGrad)">TURBO</text>

  <!-- SÉCURITY text -->
  <text x="44" y="44"
    font-family="'Inter', Arial, sans-serif"
    font-size="8.5"
    font-weight="400"
    letter-spacing="5"
    fill="#9ca3af">SÉCURITY</text>

  <!-- Gold underline accent -->
