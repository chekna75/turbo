<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#edc854;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4971a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b97514;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4971a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a4116;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <path d="M14 8 L26 8 L26 22 C26 28 20 32 20 32 C20 32 14 28 14 22 Z"
    fill="url(#shieldGrad)" />
  <path d="M16.5 17 L18.5 19.5 L23.5 13"
